helpful_assistant_task:
  description: >
    Answer the user's query: "{question}"

    Steps to follow:
    1. Search your knowledge sources (user profile + story book PDF) using
       semantic retrieval from ChromaDB.
    2. If the question is about the user (who am I, where do I live, etc.),
       use the user profile knowledge source.
    3. If the question is about story content, characters, or plot,
       use the PDF knowledge source.
    4. Combine both sources if the question spans both.
    5. Provide a concise, accurate, and friendly response.
  expected_output: >
    A clear and helpful answer to "{question}" based on the retrieved
    knowledge from ChromaDB (user profile and/or PDF story book).
    Always cite which knowledge source the answer came from.
  agent: helpful_assistant
